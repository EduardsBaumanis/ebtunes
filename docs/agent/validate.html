<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strudel validator</title>
  <script>
    // Suppress real audio output — we only want to know if the code
    // parses and evaluates without throwing. Stub the destination so
    // nothing is actually heard, but everything else runs.
    (function () {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;
      function Patched() {
        var ctx = new Orig();
        if (!window._ac) window._ac = ctx;
        return ctx;
      }
      Patched.prototype = Orig.prototype;
      window.AudioContext = Patched;
      if (window.webkitAudioContext) window.webkitAudioContext = Patched;
    })();
  </script>
  <script src="https://unpkg.com/@strudel/repl@1.3.0" defer></script>
</head>
<body>
  <strudel-editor id="engine"><!--
s("bd")
  --></strudel-editor>

  <script>
    function waitForEditor(timeoutMs) {
      return new Promise(function (resolve, reject) {
        var t0 = Date.now();
        var id = setInterval(function () {
          var e = document.getElementById('engine');
          if (e && e.editor) { clearInterval(id); resolve(e); }
          else if (Date.now() - t0 > timeoutMs) {
            clearInterval(id);
            reject(new Error('strudel-editor never initialised'));
          }
        }, 100);
      });
    }

    // Synchronously load + evaluate the candidate pattern, then stop it.
    // Returns:
    //   ""        — clean evaluation
    //   "<error>" — error string thrown by setCode / evaluate
    //
    // page.on('pageerror') + page.on('console.error') in the Python side
    // catch anything that surfaces asynchronously (delayed scheduler
    // errors, async sample-load failures).
    window.validateStrudel = async function (code) {
      var engine;
      try {
        engine = await waitForEditor(20000);
      } catch (e) {
        return 'editor init failed: ' + e.message;
      }
      try {
        engine.editor.setCode(code);
        engine.editor.evaluate();
      } catch (e) {
        return (e && e.message) ? e.message : String(e);
      }
      // Let one cycle's worth of scheduling fire, then stop.
      await new Promise(function (r) { setTimeout(r, 350); });
      try { engine.editor.stop(); } catch (_) {}
      return '';
    };

    window.strudelReady = true;
  </script>
</body>
</html>
