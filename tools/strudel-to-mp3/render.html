<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strudel render host</title>
  <script>
    // Same AudioContext patch the lofi-player uses: every connection that
    // would normally go to the speakers gets re-routed through window._masterGain
    // first. We then tap _masterGain with a MediaStreamDestination during
    // renderStrudel() so the renderer captures everything strudel produces,
    // even if strudel internally creates more nodes / contexts later on.
    (function () {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;
      var origConnect = AudioNode.prototype.connect;
      AudioNode.prototype.connect = function (dest, out, inp) {
        if (window._realDest && dest === window._realDest && this !== window._masterGain) {
          dest = window._masterGain;
        }
        if (arguments.length >= 3) return origConnect.call(this, dest, out, inp);
        if (arguments.length >= 2) return origConnect.call(this, dest, out);
        return origConnect.call(this, dest);
      };
      function Patched() {
        var ctx = new Orig();
        if (!window._ac) {
          var descProto = Object.getOwnPropertyDescriptor(AudioContext.prototype, 'destination');
          var realDest  = descProto ? descProto.get.call(ctx) : ctx.destination;
          var master    = ctx.createGain();
          master.gain.value = 1;     // full volume — no fade for offline render
          window._ac         = ctx;
          window._masterGain = master;
          window._realDest   = realDest;
          origConnect.call(master, realDest);
        }
        return ctx;
      }
      Patched.prototype = Orig.prototype;
      window.AudioContext = Patched;
      if (window.webkitAudioContext) window.webkitAudioContext = Patched;
    })();
  </script>
  <script src="https://unpkg.com/@strudel/repl@1.3.0" defer></script>
</head>
<body>
  <strudel-editor id="engine"><!--
s("bd")
  --></strudel-editor>

  <script>
    function waitForEditor(timeoutMs) {
      return new Promise(function (resolve, reject) {
        var t0 = Date.now();
        var id = setInterval(function () {
          var e = document.getElementById('engine');
          if (e && e.editor) { clearInterval(id); resolve(e); }
          else if (Date.now() - t0 > timeoutMs) { clearInterval(id); reject(new Error('editor timeout')); }
        }, 100);
      });
    }

    // Render `code` for `durationMs` ms, return a recording as a base64 data URL.
    // Steps:
    //   1) prime strudel with a tiny silent pattern so the AudioContext exists
    //      and our patched constructor has built _masterGain
    //   2) tap _masterGain with a MediaStreamDestination + MediaRecorder
    //   3) evaluate the user code, wait durationMs, stop everything
    //   4) flush the recorder, package as data URL, return
    window.renderStrudel = async function (code, durationMs) {
      var engine = await waitForEditor(20000);

      // Prime: one short silent eval to instantiate the AudioContext.
      engine.editor.setCode('silence');
      try { engine.editor.evaluate(); } catch (_) {}
      await new Promise(function (r) { setTimeout(r, 250); });
      try { engine.editor.stop(); } catch (_) {}

      var ctx = window._ac;
      if (!ctx) throw new Error('AudioContext was not initialised');
      try { await ctx.resume(); } catch (_) {}

      // Tap the master gain so we capture everything regardless of how
      // strudel internally connects its nodes.
      var recDest  = ctx.createMediaStreamDestination();
      window._masterGain.connect(recDest);

      var recorder = new MediaRecorder(recDest.stream, {
        mimeType: 'audio/webm;codecs=opus',
        audioBitsPerSecond: 192000
      });
      var chunks = [];
      recorder.ondataavailable = function (e) { if (e.data && e.data.size > 0) chunks.push(e.data); };
      var stopped = new Promise(function (r) { recorder.onstop = r; });

      recorder.start(1000); // emit a chunk every second so memory stays bounded

      // Pre-warm the user's pattern so async sample loads (samples('github:…'))
      // finish before we start counting the duration. This avoids the first few
      // seconds of every render being silent while samples download.
      engine.editor.setCode(code);
      try { engine.editor.evaluate(); } catch (e) { console.error('eval error', e); }
      await new Promise(function (r) { setTimeout(r, 1500); });

      // Now wait the actual duration.
      await new Promise(function (r) { setTimeout(r, durationMs); });

      try { engine.editor.stop(); } catch (_) {}
      // Brief tail so reverb / delay rings out before the recorder closes.
      await new Promise(function (r) { setTimeout(r, 800); });

      recorder.stop();
      await stopped;
      try { window._masterGain.disconnect(recDest); } catch (_) {}

      var blob = new Blob(chunks, { type: 'audio/webm' });
      var reader = new FileReader();
      reader.readAsDataURL(blob);
      await new Promise(function (r) { reader.onloadend = r; });
      return reader.result;
    };

    window.strudelReady = true;
  </script>
</body>
</html>
