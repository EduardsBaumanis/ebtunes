<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lofi rater</title>
  <link rel="stylesheet" href="style.css">
  <script>
    // Same AudioContext patch as lofi-player: every audio path is forced
    // through a shared master gain so we can fade in/out smoothly and
    // unlock the context from a synchronous user-gesture handler on iOS.
    (function () {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;
      var origConnect = AudioNode.prototype.connect;
      AudioNode.prototype.connect = function (dest, out, inp) {
        if (window._realDest && dest === window._realDest && this !== window._masterGain) {
          dest = window._masterGain;
        }
        if (arguments.length >= 3) return origConnect.call(this, dest, out, inp);
        if (arguments.length >= 2) return origConnect.call(this, dest, out);
        return origConnect.call(this, dest);
      };
      function Patched() {
        var ctx = new Orig();
        if (!window._ac) {
          var descProto = Object.getOwnPropertyDescriptor(AudioContext.prototype, 'destination');
          var realDest  = descProto ? descProto.get.call(ctx) : ctx.destination;
          var master    = ctx.createGain();
          master.gain.value = 0;
          window._ac         = ctx;
          window._masterGain = master;
          window._realDest   = realDest;
          origConnect.call(master, realDest);
        } else {
          window._ac = ctx;
        }
        return ctx;
      }
      Patched.prototype = Orig.prototype;
      window.AudioContext = Patched;
      if (window.webkitAudioContext) window.webkitAudioContext = Patched;
    })();
  </script>
  <script src="https://unpkg.com/@strudel/repl@1.3.0" defer></script>
</head>
<body data-theme="rater">

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <span class="logo">◈</span>
      <nav class="playlist-tabs">
        <button id="tab-rate"  class="tab-btn active" data-view="rate">RATE</button>
        <button id="tab-board" class="tab-btn"        data-view="board">BOARD</button>
      </nav>
    </header>

    <div class="body">

      <!-- RATE PANE -->
      <main id="rate-pane" class="rate-pane">

        <div class="rate-counter" id="rate-counter">— / —</div>

        <div class="rate-info" id="rate-info">
          <div class="p-subtitle" id="r-subtitle"></div>
          <h1 class="p-title"    id="r-title">LOADING</h1>
          <div class="p-meta">
            <span class="p-badge" id="r-key">—</span>
            <span class="p-sep">·</span>
            <span class="p-badge" id="r-bpm">—</span>
            <span class="p-sep">·</span>
            <span class="p-badge" id="r-pack">—</span>
          </div>
          <p class="p-feel"   id="r-feel"></p>
          <p class="p-chords" id="r-chords"></p>
        </div>

        <div class="rate-transport">
          <button id="btn-play" class="ctrl ctrl-play" title="Play / stop (Space)">▶</button>
        </div>

        <div class="vote-row">
          <button id="btn-not" class="vote-btn vote-not">
            <span class="vote-kbd">←</span>
            <span class="vote-label">−</span>
          </button>
          <button id="btn-hot" class="vote-btn vote-hot">
            <span class="vote-label">+</span>
            <span class="vote-kbd">→</span>
          </button>
        </div>

        <button id="btn-skip" class="skip-btn" title="Skip this song (S)">SKIP</button>

        <p class="hints">SPACE · ← / → · S to skip · B for board</p>

        <div id="rate-done" class="rate-done hidden">
          <h2>ALL RATED</h2>
          <p>You've voted on every song in the demos folder.</p>
          <button id="btn-go-board" class="ctrl">SEE LEADERBOARD</button>
          <button id="btn-reset-votes" class="ctrl secondary">RESET LOCAL HISTORY</button>
        </div>
      </main>

      <!-- BOARD PANE -->
      <main id="board-pane" class="board-pane hidden">
        <div class="board-header">
          <h2 class="board-title">LEADERBOARD</h2>
          <span id="board-status" class="board-refresh-timer"></span>
        </div>
        <div id="board-content" class="board-content">
          <div class="board-loading">LOADING...</div>
        </div>
      </main>

    </div>
  </div>

  <!-- Off-screen Strudel engine -->
  <strudel-editor id="engine"><!--
s("bd")
  --></strudel-editor>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Re-use the lofi-player playlist registry so adding files to
       pack-demos automatically expands the rater's song pool. -->
  <script src="../lofi-player/playlists.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
