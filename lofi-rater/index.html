<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lofi rater</title>
  <link rel="stylesheet" href="style.css">
  <script>
    // Intercept AudioContext creation so we can call resume() from
    // our own click handlers — required for iOS Safari audio unlock.
    (function () {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;
      function Patched() {
        var ctx = new Orig();
        window._ac = ctx;
        return ctx;
      }
      Patched.prototype = Orig.prototype;
      window.AudioContext = Patched;
      if (window.webkitAudioContext) window.webkitAudioContext = Patched;
    })();
  </script>
  <script src="https://unpkg.com/@strudel/repl@1.3.0" defer></script>
</head>
<body>

  <div class="grain"></div>

  <!-- ── INTRO ── -->
  <div id="view-intro" class="view active">
    <div class="intro-content">
      <div class="intro-icon">📼</div>
      <h1 class="intro-title">lofi rater</h1>
      <p class="intro-sub">8 original lo-fi jazz tracks.<br>Rate them hot or not.</p>
      <button id="btn-start" class="btn-primary">Start Rating</button>
      <p class="intro-hint">arrow keys work too</p>
    </div>
  </div>

  <!-- ── RATING ── -->
  <div id="view-rating" class="view">
    <div class="rating-layout">

      <div class="progress-wrap">
        <div class="progress-track">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
        <span id="progress-text" class="progress-text">1 / 8</span>
      </div>

      <div id="card-wrap">
        <div id="card" class="card">
          <div class="card-inner">
            <p id="card-subtitle" class="card-subtitle"></p>
            <h2 id="card-title" class="card-title"></h2>
            <div class="card-badges">
              <span id="card-key" class="badge"></span>
              <span id="card-bpm" class="badge"></span>
            </div>
            <blockquote id="card-feel" class="card-feel"></blockquote>
            <p id="card-chords" class="card-chords"></p>
            <div id="card-tags" class="card-tags"></div>
            <button id="card-play" class="play-btn">▶ Play</button>
          </div>
          <div class="card-hot-flash"></div>
          <div class="card-not-flash"></div>
        </div>
      </div>

      <!-- ── INLINE PLAYER ── -->
      <div id="player-panel" class="player-panel">
        <div class="player-panel-inner">
          <span id="player-title" class="player-title"></span>
          <div class="player-controls">
            <button id="player-play-stop" class="player-play-stop">▶</button>
            <button id="player-close" class="player-close">✕</button>
          </div>
        </div>
      </div>

      <div class="vote-row">
        <button id="btn-not" class="vote-btn vote-not">
          <span class="vote-icon">❄️</span>
          <span class="vote-label">NOT</span>
          <kbd>←</kbd>
        </button>
        <button id="btn-hot" class="vote-btn vote-hot">
          <span class="vote-icon">🔥</span>
          <span class="vote-label">HOT</span>
          <kbd>→</kbd>
        </button>
      </div>

    </div>
  </div>

  <!-- ── RESULTS ── -->
  <div id="view-results" class="view">
    <div class="results-layout">
      <h1 class="results-title">Rankings</h1>
      <p id="results-summary" class="results-summary"></p>
      <div id="results-list" class="results-list"></div>
      <button id="btn-reset" class="btn-primary">Rate Again</button>
    </div>
  </div>

  <!-- Pre-initialized off-screen Strudel engine -->
  <strudel-editor id="strudel-engine"><!--
s("bd")
  --></strudel-editor>

  <script src="songs.js"></script>
  <script src="app.js"></script>
</body>
</html>
