<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- /lofi-rater/ has been superseded by /player/ — the new Strudel IDE
       playlist player with rating + leaderboard. Anyone who lands here
       (old bookmark, shared URL, etc.) is forwarded immediately. -->
  <meta http-equiv="refresh" content="0; url=../player/">
  <link rel="canonical" href="https://eduardsbaumanis.github.io/ebtesti/player/">
  <title>strudel player — redirecting</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06090e;
      color: #4a8090;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    a { color: #dceaef; text-decoration: none; border-bottom: 1px solid #1e3a48; }
  </style>
  <script>
    // Native redirect — runs before the body paints, so users almost
    // never see this page. Preserve any query/hash so deep links keep
    // working on the new URL.
    location.replace('../player/' + location.search + location.hash);
  </script>
</head>
<body>
  <p>Redirecting to <a href="../player/">strudel player</a>…</p>
</body>
</html>
