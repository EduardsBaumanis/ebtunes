<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>strudel</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var Orig = window.AudioContext || window.webkitAudioContext;
      if (!Orig) return;
      var origConnect = AudioNode.prototype.connect;
      AudioNode.prototype.connect = function (dest, out, inp) {
        if (window._realDest && dest === window._realDest && this !== window._masterGain) {
          dest = window._masterGain;
        }
        if (arguments.length >= 3) return origConnect.call(this, dest, out, inp);
        if (arguments.length >= 2) return origConnect.call(this, dest, out);
        return origConnect.call(this, dest);
      };
      function Patched() {
        var ctx = new Orig();
        if (!window._ac) {
          var descProto = Object.getOwnPropertyDescriptor(AudioContext.prototype, 'destination');
          var realDest  = descProto ? descProto.get.call(ctx) : ctx.destination;
          var master    = ctx.createGain();
          master.gain.value = 0;
          window._ac         = ctx;
          window._masterGain = master;
          window._realDest   = realDest;
          origConnect.call(master, realDest);
        } else {
          window._ac = ctx;
        }
        return ctx;
      }
      Patched.prototype = Orig.prototype;
      window.AudioContext = Patched;
      if (window.webkitAudioContext) window.webkitAudioContext = Patched;
    })();
  </script>
  <script src="https://unpkg.com/@strudel/repl@1.3.0" defer></script>
</head>
<body>

  <div class="app">

    <!-- ── HEADER ── -->
    <header class="header">
      <span class="logo">◈</span>
      <nav class="playlist-tabs" id="playlist-tabs"></nav>
      <button id="btn-board" class="board-btn">BOARD</button>
      <button id="btn-shuffle" class="shuffle-btn">⇄</button>
    </header>

    <!-- ── BODY ── -->
    <div class="body">

      <!-- ── SIDEBAR ── -->
      <aside class="sidebar">
        <div id="song-list" class="song-list"></div>
      </aside>

      <!-- ── PLAYER PANE ── -->
      <main id="player-pane" class="player-pane">

        <div class="player-info" id="player-info">
          <div class="p-counter" id="p-counter">01 · 01</div>
          <div class="p-subtitle" id="p-subtitle"></div>
          <h1 class="p-title" id="p-title">—</h1>
          <div class="p-meta">
            <span class="p-badge" id="p-key">—</span>
            <span class="p-sep">·</span>
            <span class="p-badge" id="p-bpm">—</span>
          </div>
          <p class="p-feel" id="p-feel"></p>
          <p class="p-chords" id="p-chords"></p>
        </div>

        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle class="ring-track" cx="100" cy="100" r="80"/>
            <circle id="ring-fill" class="ring-fill" cx="100" cy="100" r="80"/>
          </svg>
          <div class="ring-center">
            <div id="ring-time" class="ring-time">2:00</div>
            <div class="ring-label">NEXT</div>
          </div>
        </div>

        <div class="controls">
          <button id="btn-prev" class="ctrl">⏮</button>
          <button id="btn-play" class="ctrl ctrl-play">▶</button>
          <button id="btn-next" class="ctrl">⏭</button>
        </div>

        <div class="timer-row">
          <span class="timer-label">AUTO</span>
          <input type="range" id="timer-slider" class="timer-slider"
                 min="15" max="600" step="5" value="120">
          <span id="timer-val" class="timer-val">2:00</span>
        </div>

        <p class="hints">SPACE · J / L · ← →</p>
      </main>

      <!-- ── BOARD PANE ── -->
      <main id="board-pane" class="board-pane hidden">
        <div class="board-header">
          <h2 class="board-title">LEADERBOARD</h2>
          <span id="board-refresh-timer" class="board-refresh-timer"></span>
        </div>
        <div id="board-content" class="board-content">
          <div class="board-loading">LOADING...</div>
        </div>
      </main>

      <!-- ── CODE PANE ── -->
      <main id="code-pane" class="code-pane hidden">

        <div class="code-header">
          <h2 id="code-title" class="code-title">—</h2>
          <span id="code-counter" class="code-counter">01 · 01</span>
        </div>

        <div class="code-hints-bar">
          <span>CTRL+ENTER — run</span>
          <span class="dot">·</span>
          <span>CTRL+. — stop</span>
        </div>

        <textarea id="code-area" class="code-area" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>

        <div class="code-controls">
          <button id="btn-run"  class="code-btn run-btn">▶ RUN</button>
          <button id="btn-stop" class="code-btn stop-btn">■ STOP</button>
          <div class="code-nav">
            <button id="code-prev" class="cnav-btn">← PREV</button>
            <button id="code-next" class="cnav-btn">NEXT →</button>
          </div>
        </div>

      </main>

    </div>
  </div>

  <!-- Off-screen Strudel engine -->
  <strudel-editor id="engine"><!--
s("bd")
  --></strudel-editor>

  <script src="playlists.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
