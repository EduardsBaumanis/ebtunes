name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          set -euo pipefail
          mkdir _site

          cp README.md LICENSE .nojekyll _site/
          cp docs/STRUCTURE.md _site/STRUCTURE.md
          cp docs/STRUDEL_SAMPLE_REPOS.md _site/STRUDEL_SAMPLE_REPOS.md
          cp docs/SUPABASE_SETUP.md _site/SUPABASE_SETUP.md
          cp docs/supabase-setup.sql _site/supabase-setup.sql
          cp apps/index.html _site/index.html

          for dir in apps/lofi-player apps/lofi-rater apps/player apps/izlase; do
            public_name="${dir#apps/}"
            rsync -a "$dir/" "_site/$public_name/"
          done

          for dir in collections/* courses/*; do
            [ -d "$dir" ] || continue
            public_name="${dir#*/}"
            rsync -a "$dir/" "_site/$public_name/"
          done

          rsync -a tools/agent/ _site/agent/
          rsync -a tools/merger/ _site/merger/
          rsync -a tools/orginals/ _site/orginals/
          rsync -a tools/reports/ _site/reports/
          rsync -a tools/sampler/ _site/sampler/
          rsync -a tools/strudel-to-mp3/ _site/strudel-to-mp3/
          mkdir -p _site/tools
          cp tools/strudel-similarity.mjs _site/tools/strudel-similarity.mjs

          # Keep old docs-prefixed Pages URLs working without duplicating the
          # source tree in git.
          mkdir _site-docs-mirror
          rsync -a _site/ _site-docs-mirror/
          mkdir -p _site/docs
          rsync -a _site-docs-mirror/ _site/docs/
          rm -rf _site-docs-mirror
          cp docs/*.md docs/*.sql _site/docs/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Let branch Pages build finish
        run: |
          # This repo still has GitHub's automatic branch-based Pages build
          # enabled. That dynamic build can finish after this workflow and mark
          # this artifact deployment inactive, leaving the public site at 404.
          # Deploy this artifact last so the generated public path map wins.
          sleep 90

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
